<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Todo Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main id="app">
        <article id="todo-card" data-testid="test-todo-card" class="todo-card">
            
            <!-- Edit Form Block (Mirrors display layout) -->
            <form id="edit-form" class="hidden" data-testid="test-todo-edit-form">
                <div class="card-header">
                    <div class="header-content">
                        <div class="edit-input-group">
                            <label for="edit-title">Title</label>
                            <input type="text" id="edit-title" data-testid="test-todo-edit-title-input" class="edit-input-inline title-input" placeholder="Title">
                        </div>
                        <div class="edit-input-group">
                            <label for="edit-description">Description</label>
                            <textarea id="edit-description" data-testid="test-todo-edit-description-input" class="edit-input-inline desc-textarea" placeholder="Description"></textarea>
                        </div>
                    </div>
                    <div class="priority-wrapper">
                        <select id="edit-priority" data-testid="test-todo-edit-priority-select" class="edit-select-badge">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>
                <div class="todo-due-date">
                    <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <input type="date" id="edit-due-date" data-testid="test-todo-edit-due-date-input" class="edit-input-inline date-input">
                </div>
            </form>

            <!-- Display Block -->
            <div id="todo-display">
                <!-- Header -->
                <div class="card-header">
                    <div class="header-content">
                        <h2 id="todo-title" data-testid="test-todo-title" class="todo-title">Sleep</h2>
                        <p id="todo-description" data-testid="test-todo-description" class="todo-description">Sleep for 8 hours</p>
                    </div>
                    <!-- Priority badge -->
                    <span id="todo-priority" data-testid="test-todo-priority" class="badge priority-low">Low</span>
                </div>

                <!-- Due date -->
                <time id="todo-due-date" class="todo-due-date" data-testid="test-todo-due-date">
                    <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <span id="date-text">Tue Apr 14 2026</span>
                    <span id="time-remaining" data-testid="test-todo-time-remaining" class="time-remaining">
                        · Due tomorrow
                    </span>
                </time>
            </div>

            <!-- Tags (Shared) -->
            <ul id="todo-tags" role="list" data-testid="test-todo-tags" class="tag-list">
                <li data-testid="test-todo-tag-work" class="tag">#work</li>
                <li data-testid="test-todo-tag-personal" class="tag">#personal</li>
            </ul>

            <!-- Divider -->
            <div class="divider"></div>

            <!-- Status row + checkbox -->
            <div class="status-row">
                <span id="todo-status" data-testid="test-todo-status" class="badge status-pending">Pending</span>

                <label class="complete-toggle" data-testid="test-todo-status-control">
                    <input type="checkbox" id="todo-complete-toggle" data-testid="test-todo-complete-toggle" class="sr-only">
                    <span class="checkbox-box">
                        <svg class="check-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                    </span>
                    <span class="toggle-text">Mark complete</span>
                </label>
            </div>

            <!-- Actions -->
            <div class="card-actions">
                <button id="edit-button" data-testid="test-todo-edit-button" aria-label="Edit todo" class="btn btn-secondary">Edit</button>
                <button id="delete-button" data-testid="test-todo-delete-button" aria-label="Delete todo" class="btn btn-danger">Delete</button>
                <button id="save-button" data-testid="test-todo-save-button" aria-label="Save todo" class="btn btn-secondary hidden">Save</button>
                <button id="cancel-button" data-testid="test-todo-cancel-button" aria-label="Cancel todo" class="btn btn-secondary hidden">Cancel</button>
            </div>
        </article>
    </main>
    <script src="script.js"></script>
</body>
</html>
